kind: pipeline
name: default

concurrency:
  limit: 1

test_when_condition: &test_when_condition
  when:
    branch: [ master ]

prod_when_condition: &prod_when_condition
  when:
    ref:
      - refs/tags/release-*


steps:
- name: prebuild
  image: node:9
  pull: always
  commands:
    - cd server && npm rebuild && npm run production


- name: publish_test
  image: plugins/docker
  pull: always
  settings:
    repo: docker-registry.la.utexas.edu/lrc
    tags:
    - 'test'
  <<: *test_when_condition


- name: deploy_test
  image: docker-registry.la.utexas.edu/drone-k8s-redeploy
  settings:
    kubernetes_token:                                                                   
      from_secret: kubernetes_token
    kubernetes_server:                                                    
      from_secret: kubernetes_server
    namespace: lrc-test
    workload: web
  <<: *test_when_condition


- name: publish_prod
  image: plugins/docker
  pull: always
  settings:
    repo: docker-registry.la.utexas.edu/lrc
    tags:
    - 'prod'
  <<: *prod_when_condition


- name: deploy_prod
  image: docker-registry.la.utexas.edu/drone-k8s-redeploy
  settings:
    kubernetes_token:                                                                   
      from_secret: kubernetes_token
    kubernetes_server:                                                    
      from_secret: kubernetes_server
    namespace: lrc
    workload: web
  <<: *prod_when_condition

