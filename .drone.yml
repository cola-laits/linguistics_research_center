type: docker
kind: pipeline
name: default

concurrency:
  limit: 1

test_when_condition: &test_when_condition
  when:
    branch: [ master ]

prod_when_condition: &prod_when_condition
  when:
    ref:
      - refs/tags/release-*


steps:
- name: build
  image: plugins/docker
  pull: always
  environment:
    BACKPACK_COMPOSER_USER:
      from_secret: backpack_composer_user
    BACKPACK_COMPOSER_PASS:
      from_secret: backpack_composer_pass
  settings:
    username:
      from_secret: dockerhub_username
    password:
      from_secret: dockerhub_token
    repo: laitsdev/lrc
    tags:
      - 'drone-${DRONE_BUILD_NUMBER}'
    build_args_from_env:
      - BACKPACK_COMPOSER_USER
      - BACKPACK_COMPOSER_PASS
  <<: *test_when_condition


- name: deploy_test
  image: quay.io/honestbee/drone-kubernetes
  settings:
    kubernetes_token:
      from_secret: kubernetes_token
    kubernetes_server:
      from_secret: kubernetes_server
    namespace: lrc-test
    deployment: web
    container: web
    repo: laitsdev/lrc
    tag: drone-${DRONE_BUILD_NUMBER}
  <<: *test_when_condition



- name: deploy_prod
  image: quay.io/honestbee/drone-kubernetes
  settings:
    kubernetes_token:
      from_secret: kubernetes_token
    kubernetes_server:
      from_secret: kubernetes_server
    namespace: lrc
    deployment: web
    container: web
    repo: laitsdev/lrc
    tag: drone-${DRONE_BUILD_NUMBER}
  <<: *prod_when_condition

image_pull_secrets:
  - dockerconfig